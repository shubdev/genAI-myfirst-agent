services:

    backend:
        build: ./backend
        ports:
            - "5000:5000"
        volumes:
            - ./backend:/app
            - backend_node_modules:/app/node_modules
        env_file:
            - ./backend/.env

        command: npm run dev

    frontend:
        build: ./frontend/genai
        ports:
            - "5173:5173"
        volumes:
            - ./frontend/genai:/app
            - frontend_node_modules:/app/node_modules
        command: npm run dev

volumes:
    backend_node_modules:
    frontend_node_modules:
